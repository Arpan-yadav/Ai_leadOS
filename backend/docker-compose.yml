version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_leados_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leados}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leados_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_leados}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leados']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_leados_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leados.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      - postgres

volumes:
  postgres_data:
