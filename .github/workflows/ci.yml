name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Build Backend
      run: |
        cd backend
        npm run build

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Lint Backend
      run: |
        cd backend
        npm run lint
      continue-on-error: true

    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint
      continue-on-error: true
